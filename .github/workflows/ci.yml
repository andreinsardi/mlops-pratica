name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src tests dags

      - name: Test (pytest)
        env:
          PYTHONPATH: src
        run: pytest --cov=src/mlops_pratica --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Airflow image (sanity check)
        run: docker build -t mlops-airflow:ci ./infra/airflow

      - name: Build MLflow image (sanity check)
        run: docker build -t mlops-mlflow:ci ./infra/mlflow

      - name: Build FastAPI image (sanity check)
        run: docker build -t mlops-fastapi:ci ./infra/fastapi
