# =============================================================================
# MLOps Prática - Stack 100% Docker
# Componentes: Postgres+pgvector, MinIO, MLflow, Airflow (webserver+scheduler),
#              FastAPI
# Uso: docker compose up -d
# =============================================================================
name: mlops-pratica

x-airflow-common: &airflow-common
  build:
    context: ./infra/airflow
    dockerfile: Dockerfile
  image: mlops-pratica/airflow:2.9
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
    PYTHONPATH: /opt/airflow/src
    # MLflow / MinIO
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    # Postgres app (pgvector)
    PG_HOST: postgres
    PG_PORT: "5432"
    PG_DB: app
    PG_USER: app
    PG_PASSWORD: app
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_healthy
    mlflow:
      condition: service_started
  networks:
    - mlops-net

services:
  # ---------------------------------------------------------------------------
  # Postgres (compartilha 3 DBs: airflow, mlflow, app[pgvector])
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mlops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - mlops-net

  # ---------------------------------------------------------------------------
  # MinIO (S3 compatible) + criação de buckets
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    container_name: mlops-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mlops-net

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: mlops-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: /bin/sh -c
    command:
      - |
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/raw;
        mc mb --ignore-existing local/curated;
        mc mb --ignore-existing local/features;
        mc mb --ignore-existing local/mlflow-artifacts;
        mc anonymous set download local/mlflow-artifacts;
        echo "MinIO buckets criados.";
    networks:
      - mlops-net

  # ---------------------------------------------------------------------------
  # MLflow Tracking + Registry
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ./infra/mlflow
      dockerfile: Dockerfile
    image: mlops-pratica/mlflow:2.16
    container_name: mlops-mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root s3://mlflow-artifacts/
      --serve-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    networks:
      - mlops-net

  # ---------------------------------------------------------------------------
  # Airflow init (cria usuário admin + roda db migrate)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: mlops-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: mlops-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: mlops-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI - serving /predict e /search
  # ---------------------------------------------------------------------------
  fastapi:
    build:
      context: ./infra/fastapi
      dockerfile: Dockerfile
    image: mlops-pratica/fastapi:0.1
    container_name: mlops-fastapi
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: app
      PG_USER: app
      PG_PASSWORD: app
      MODEL_NAME: hn_classifier
      MODEL_STAGE: Production
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - mlops-net
    restart: unless-stopped

networks:
  mlops-net:
    name: mlops-net
    driver: bridge

volumes:
  postgres_data:
  minio_data:
